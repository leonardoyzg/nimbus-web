<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
        
    >

    <title>Registro | Nimbus</title>

    <link
        rel="stylesheet"
        href="styles.css"
    >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar-nimbus">

        <div class="logo-area">

            <img
                src="Nimbus logo.png"
                alt="Nimbus"
                class="logo"
            >

            <h1>NIMBUS</h1>

        </div>

    </header>

    <!-- REGISTER -->

    <main>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0" style="max-width:480px;width:100%;">

        <div class="card-body text-center p-5">

            <img
                src="Nimbus logo.png"
                alt="Nimbus"
                width="100"
                class="mb-3"
            >

            <h2 class="fw-bold">
                Crear Cuenta
            </h2>

            <p class="text-muted mb-4">
                Sistema de Vigilancia Inteligente
            </p>

            <input
                type="text"
                id="nombre"
                class="form-control mb-3"
                placeholder="Nombre de usuario"
            >

            <input
                type="email"
                id="correo"
                class="form-control mb-3"
                placeholder="Correo electrónico"
            >

            <input
                type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Contraseña"
            >

            <button
                id="btnRegister"
                class="btn btn-danger w-100"
            >
                Registrarme
            </button>

            <p class="mt-4">

                ¿Ya tienes cuenta?

                <a
                    href="index.html"
                    class="text-danger fw-bold text-decoration-none"
                >
                    Inicia sesión
                </a>

            </p>

            <p id="mensaje-register"></p>

        </div>

    </div>

</div>

</main>

    <!-- FIREBASE -->

    <script type="module">

        import { auth, db }
        from "./firebase-config.js";

        import {

            createUserWithEmailAndPassword

        }

        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        import {

            doc,
            setDoc

        }

        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const btnRegister =
            document.getElementById("btnRegister");

        btnRegister.addEventListener("click", async () => {

            const nombre =
                document.getElementById("nombre").value;

            const correo =
                document.getElementById("correo").value;

            const password =
                document.getElementById("password").value;

            const mensaje =
                document.getElementById("mensaje-register");

            if (
                nombre === "" ||
                correo === "" ||
                password === ""
            ) {

                mensaje.innerText =
                    "Completa todos los campos";

                mensaje.style.color =
                    "red";

                return;
            }

            try {

                // CREAR USUARIO AUTH

                const userCredential =
                    await createUserWithEmailAndPassword(
                        auth,
                        correo,
                        password
                    );

                const user =
                    userCredential.user;

                // GUARDAR DATOS EN FIRESTORE

                await setDoc(

                    doc(
                        db,
                        "usuarios",
                        user.uid
                    ),

                    {

                        nombre: nombre,
                        correo: correo

                    }

                );

                mensaje.innerText =
                    "Cuenta creada correctamente";

                mensaje.style.color =
                    "green";

                setTimeout(() => {

                    window.location.href =
                        "index.html";

                }, 1500);

            }

            catch (error) {

                mensaje.innerText =
                    error.message;

                mensaje.style.color =
                    "red";
            }

        });

    </script>

</body>

</html>
